[pytest]
markers =
    unit: Fast mocked tests (default CI run)
    e2e: Live LLM tests (requires OPENAI_API_KEY, slower)
    load: Concurrency and load tests
    regression: Bug guard / regression tests
    hinglish: Hindi/Hinglish language tests
addopts = -m "not e2e and not load" -v --tb=short --timeout=15
testpaths = tests
